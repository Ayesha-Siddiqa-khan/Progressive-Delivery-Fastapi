namespace:
  name: progressive-delivery-staging

replicaCount: 2

image:
  tag: "staging-placeholder"

imagePullSecrets:
  - name: ecr-pull-secret

app:
  version: "v1"
  releaseMode: "good"

rollout:
  enabled: false

analysis:
  enabled: false

ingress:
  className: nginx
  host: staging.progressive-app.example.com
  alb:
    enabled: false

serviceMonitor:
  enabled: false
