{{- if .Values.database.createExampleSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.database.existingSecret }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{ .Values.database.secretKey }}: {{ .Values.database.exampleUrl | quote }}
{{- end }}
