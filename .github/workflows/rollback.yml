name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      namespace:
        description: "Kubernetes namespace"
        required: true
        default: progressive-delivery-staging
      release_name:
        description: "Helm release and Argo Rollout name"
        required: true
        default: progressive-app

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    name: Roll back selected environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate GitHub Actions configuration
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "${KUBE_CONFIG_DATA:-}" ]; then
            echo "::error title=Missing Secrets::KUBE_CONFIG_DATA is not configured. Add KUBE_CONFIG_DATA in GitHub repository Secrets."
            exit 1
          fi

          if ! printf '%s' "${KUBE_CONFIG_DATA}" | base64 --decode >/dev/null 2>&1; then
            echo "::error title=Invalid Secrets::KUBE_CONFIG_DATA must be the base64 kubeconfig generated from the self-managed Kubernetes master, not raw kubeconfig YAML."
            exit 1
          fi

      - name: Configure kubeconfig for self-managed Kubernetes
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "${HOME}/.kube"
          printf '%s' "${KUBE_CONFIG_DATA}" | base64 --decode > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"
          kubectl config current-context

      - name: Verify Kubernetes API access
        run: |
          if ! kubectl cluster-info; then
            echo "::error title=Kubernetes API unreachable::The kubeconfig was decoded, but GitHub Actions cannot reach the self-managed Kubernetes API. Check that KUBE_CONFIG_DATA uses the public API endpoint, or run this workflow on a self-hosted runner inside the VPC."
            exit 1
          fi
          kubectl get nodes -o wide

      - name: Install Argo Rollouts kubectl plugin
        run: |
          curl -sSL -o kubectl-argo-rollouts https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts
          sudo mv kubectl-argo-rollouts /usr/local/bin/kubectl-argo-rollouts

      - name: Show rollout history
        env:
          NAMESPACE: ${{ inputs.namespace }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: kubectl argo rollouts history rollout "${RELEASE_NAME}" -n "${NAMESPACE}" || true

      - name: Abort active rollout if one is running
        env:
          NAMESPACE: ${{ inputs.namespace }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: kubectl argo rollouts abort "${RELEASE_NAME}" -n "${NAMESPACE}" || true

      - name: Roll back
        env:
          NAMESPACE: ${{ inputs.namespace }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          kubectl argo rollouts undo "${RELEASE_NAME}" -n "${NAMESPACE}" \
            || helm rollback "${RELEASE_NAME}" -n "${NAMESPACE}"

      - name: Show final rollout status
        env:
          NAMESPACE: ${{ inputs.namespace }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: kubectl argo rollouts status "rollout/${RELEASE_NAME}" -n "${NAMESPACE}" --timeout 10m

      - name: Write rollback summary
        run: |
          {
            echo "## Rollback summary"
            echo ""
            echo "- Environment: ${{ inputs.environment }}"
            echo "- Namespace: ${{ inputs.namespace }}"
            echo "- Release: ${{ inputs.release_name }}"
            echo "- Method: Argo Rollouts undo with Helm rollback fallback"
          } >> "${GITHUB_STEP_SUMMARY}"
