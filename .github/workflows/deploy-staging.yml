name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  RELEASE_NAME: progressive-app
  NAMESPACE: progressive-delivery-staging

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, push, and deploy to staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate GitHub Actions configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          DATABASE_URL_STAGING: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          missing=0

          check_required() {
            local name="$1"
            local value="$2"
            local location="$3"

            if [ -z "${value:-}" ]; then
              echo "::error title=Missing ${location}::${name} is not configured. Add ${name} in GitHub repository ${location}."
              missing=1
            fi
          }

          check_required "AWS_ROLE_TO_ASSUME" "${AWS_ROLE_TO_ASSUME}" "Variables"
          check_required "AWS_REGION" "${AWS_REGION}" "Variables"
          check_required "AWS_ACCOUNT_ID" "${AWS_ACCOUNT_ID}" "Variables"
          check_required "ECR_REPOSITORY" "${ECR_REPOSITORY}" "Variables"
          check_required "STAGING_HOST" "${STAGING_HOST}" "Variables"
          check_required "KUBE_CONFIG_DATA" "${KUBE_CONFIG_DATA}" "Secrets"
          check_required "DATABASE_URL_STAGING" "${DATABASE_URL_STAGING}" "Secrets"

          if [ "${missing}" -ne 0 ]; then
            echo "Configure missing values in: GitHub repository -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          if ! printf '%s' "${KUBE_CONFIG_DATA}" | base64 --decode >/dev/null 2>&1; then
            echo "::error title=Invalid Secrets::KUBE_CONFIG_DATA must be the base64 kubeconfig generated from the self-managed Kubernetes master, not raw kubeconfig YAML."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          IMAGE_REPOSITORY="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}"
          IMAGE_URI="${IMAGE_REPOSITORY}:${GITHUB_SHA}"
          echo "IMAGE_REPOSITORY=${IMAGE_REPOSITORY}" >> "${GITHUB_ENV}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"
          docker build -f docker/Dockerfile -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Configure kubeconfig for self-managed Kubernetes
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "${HOME}/.kube"
          printf '%s' "${KUBE_CONFIG_DATA}" | base64 --decode > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"
          kubectl config current-context

      - name: Verify Kubernetes API access
        run: |
          if ! kubectl cluster-info; then
            echo "::error title=Kubernetes API unreachable::The kubeconfig was decoded, but GitHub Actions cannot reach the self-managed Kubernetes API. Check that KUBE_CONFIG_DATA uses the public API endpoint, or run this workflow on a self-hosted runner inside the VPC."
            exit 1
          fi
          kubectl get nodes -o wide

      - name: Install Argo Rollouts kubectl plugin
        run: |
          curl -sSL -o kubectl-argo-rollouts https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts
          sudo mv kubectl-argo-rollouts /usr/local/bin/kubectl-argo-rollouts

      - name: Create or update database secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL_STAGING is not configured."
            exit 1
          fi
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic progressive-app-db \
            --namespace "${NAMESPACE}" \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install "${RELEASE_NAME}" ./helm/progressive-app \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            -f helm/progressive-app/values.yaml \
            -f helm/progressive-app/values-staging.yaml \
            --set namespace.name="${NAMESPACE}" \
            --set image.repository="${IMAGE_REPOSITORY}" \
            --set image.tag="${GITHUB_SHA}" \
            --set database.existingSecret="progressive-app-db" \
            --set database.secretKey="DATABASE_URL" \
            --set ingress.host="${{ vars.STAGING_HOST }}"

      - name: Wait for Argo Rollout
        run: kubectl argo rollouts status rollout/progressive-app -n "${NAMESPACE}" --timeout 10m

      - name: Run smoke tests
        run: bash scripts/smoke-test.sh "https://${{ vars.STAGING_HOST }}"

      - name: Write deployment summary
        run: |
          {
            echo "## Staging deployment"
            echo ""
            echo "- Namespace: ${NAMESPACE}"
            echo "- Release: ${RELEASE_NAME}"
            echo "- Image: ${IMAGE_URI}"
            echo "- Host: https://${{ vars.STAGING_HOST }}"
            echo "- Rollout: progressive-app"
          } >> "${GITHUB_STEP_SUMMARY}"
