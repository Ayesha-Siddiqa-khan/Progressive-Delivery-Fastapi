name: Promote Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote, usually a Git SHA from staging"
        required: true

env:
  RELEASE_NAME: progressive-app
  NAMESPACE: progressive-delivery-production

permissions:
  id-token: write
  contents: read

jobs:
  promote:
    name: Promote approved release to production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.PRODUCTION_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ vars.AWS_REGION }}" \
            --name "${{ vars.EKS_CLUSTER_NAME }}"

      - name: Install Argo Rollouts kubectl plugin
        run: |
          curl -sSL -o kubectl-argo-rollouts https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts
          sudo mv kubectl-argo-rollouts /usr/local/bin/kubectl-argo-rollouts

      - name: Create or update database secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL_PRODUCTION is not configured."
            exit 1
          fi
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic progressive-app-db \
            --namespace "${NAMESPACE}" \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Generate release notes
        run: |
          echo "## Release notes" > release-notes.md
          git describe --tags --abbrev=0 HEAD^ >/tmp/last_tag 2>/dev/null || true
          if [ -s /tmp/last_tag ]; then
            git log "$(cat /tmp/last_tag)"..HEAD --pretty="- %s" >> release-notes.md
          else
            git log -10 --pretty="- %s" >> release-notes.md
          fi
          cat release-notes.md

      - name: Deploy production with Helm
        env:
          IMAGE_REPOSITORY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}
        run: |
          helm upgrade --install "${RELEASE_NAME}" ./helm/progressive-app \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            -f helm/progressive-app/values.yaml \
            -f helm/progressive-app/values-production.yaml \
            --set namespace.name="${NAMESPACE}" \
            --set image.repository="${IMAGE_REPOSITORY}" \
            --set image.tag="${{ inputs.image_tag }}" \
            --set app.version="v2" \
            --set app.releaseMode="good" \
            --set database.existingSecret="progressive-app-db" \
            --set database.secretKey="DATABASE_URL" \
            --set ingress.host="${{ vars.PRODUCTION_HOST }}"

      - name: Wait for Argo Rollout
        run: kubectl argo rollouts status rollout/progressive-app -n "${NAMESPACE}" --timeout 15m

      - name: Run smoke tests
        run: bash scripts/smoke-test.sh "https://${{ vars.PRODUCTION_HOST }}"

      - name: Write production summary
        env:
          IMAGE_REPOSITORY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}
        run: |
          {
            echo "## Production promotion"
            echo ""
            echo "- Namespace: ${NAMESPACE}"
            echo "- Release: ${RELEASE_NAME}"
            echo "- Image: ${IMAGE_REPOSITORY}:${{ inputs.image_tag }}"
            echo "- Host: https://${{ vars.PRODUCTION_HOST }}"
            echo "- Manual approval: GitHub Environment production"
          } >> "${GITHUB_STEP_SUMMARY}"
